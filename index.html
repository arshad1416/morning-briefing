<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Briefing</title>

  <!--
    Apply saved theme BEFORE the stylesheet renders to prevent
    a flash of the wrong theme on load. This tiny inline script
    runs synchronously in <head>, before any paint.
  -->
  <script>
    (function() {
      var saved = localStorage.getItem('mb-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- CSS loaded dynamically with auto cache-bust version -->
  <script>
    (function() {
      var v = Date.now().toString(36);
      var sheets = ['/assets/css/style.css', '/assets/css/maplegamma.css'];
      sheets.forEach(function(href) {
        var l = document.createElement('link');
        l.rel = 'stylesheet';
        l.href = href + '?v=' + v;
        document.head.appendChild(l);
      });
    })();
  </script>
</head>
<body>
  <nav class="nav-bar">
    <a href="#/" class="nav-brand">
      <img src="/assets/img/maplegamma-logo.svg" alt="MapleGamma" height="42" style="height:42px;vertical-align:middle;margin-top:-4px">
    </a>
    <div class="nav-links">
      <a href="#/"          class="nav-link">Dashboard</a>
      <a href="#/mg"        class="nav-link">GEX/DEX/VEX</a>
      <a href="#/watchlist" class="nav-link">Watchlist</a>

      <a href="#/archive"   class="nav-link">Archive</a>
      <a href="#/backtest-research" class="nav-link">Research</a>
      <a href="#/trades"    class="nav-link">Trades</a>
      <a href="#/portfolio" class="nav-link">Portfolio</a>
      <a href="#/simulation" class="nav-link">Simulation</a>
      <a href="#/prediction-engine" class="nav-link">Predictions</a>
      <a href="#/chat"      class="nav-link">AI Analysis</a>
    </div>
    <button
      id="theme-toggle"
      class="theme-toggle"
      aria-label="Toggle light/dark mode"
      type="button"
    >
      <span class="theme-toggle-icon" aria-hidden="true"></span>

    </button>
  </nav>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Briefing</title>

  <!-- Google Fonts — v1 cream/ink design language -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Schibsted+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!--
    Apply saved theme BEFORE the stylesheet renders to prevent
    a flash of the wrong theme on load. This tiny inline script
    runs synchronously in <head>, before any paint.
  -->
  <script>
    (function() {
      var saved = localStorage.getItem('mb-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- CSS loaded dynamically with auto cache-bust version -->
  <script>
    (function() {
      var v = Date.now().toString(36);
      var sheets = ['/assets/css/style.css', '/assets/css/maplegamma.css', '/assets/css/screener.css'];
      sheets.forEach(function(href) {
        var l = document.createElement('link');
        l.rel = 'stylesheet';
        l.href = href + '?v=' + v;
        document.head.appendChild(l);
      });
    })();
  </script>
</head>
<body>
  <nav class="nav-bar">
    <a href="#/" class="nav-brand">
      <img src="/assets/img/maplegamma-logo.svg" alt="MapleGamma" height="42" style="height:42px;vertical-align:middle;margin-top:-4px">
    </a>
    <div class="nav-links">
      <a href="#/"     class="nav-link">Dashboard</a>
      <a href="#/today" class="nav-link" style="display:none">Today</a>
      <a href="#/positions" class="nav-link">Positions</a>
      <a href="#/options" class="nav-link">Options</a>
      <a href="#/screener" class="nav-link">Screener</a>
      <a href="#/research" class="nav-link">Research</a>
      <a href="#/models"  class="nav-link">Models</a>
    </div>
    <button
      id="theme-toggle"
      class="theme-toggle"
      aria-label="Toggle light/dark mode"
      type="button"
    >
      <span class="theme-toggle-icon" aria-hidden="true"></span>
      <span class="theme-toggle-label"></span>
    </button>
    <a href="#/maplegamma" class="nav-link-mg" title="MapleGamma GEX/DEX Dashboard" style="font-size:0.68rem;color:var(--text-muted);text-decoration:none;padding:4px 6px;border:1px solid var(--border-dim);border-radius:4px;white-space:nowrap;margin-left:4px">Γ</a>
  </nav>

  <main id="app">
    <div class="loading">Loading...</div>
  </main>

  <script>
    (function() {
      var v = Date.now().toString(36);
      var scripts = [
        '/assets/js/utils.js',
        '/assets/js/state.js',
        '/assets/js/dashboard.js',
        '/assets/js/ticker-detail.js',
        '/assets/js/research.js',
        '/assets/js/prediction-engine.js',
        '/assets/js/models.js',
        '/assets/js/archive.js',
        '/assets/js/paper-trades.js',
        '/assets/js/chat.js',
        '/assets/js/maplegamma.js',
        '/assets/js/portfolio.js',
        '/assets/js/simulation.js',
        '/assets/js/screener.js',
        '/assets/js/router.js',
        '/assets/js/app.js'
      ];
      scripts.forEach(function(src) {
        var s = document.createElement('script');
        s.src = src + '?v=' + v;
        s.async = false;
        document.body.appendChild(s);
      });
    })();
  </script>
</body>
</html>

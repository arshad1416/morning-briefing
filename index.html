<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Briefing</title>

  <!-- Google Fonts — v1 cream/ink design language -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400..700&family=Schibsted+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!--
    Apply saved theme BEFORE the stylesheet renders to prevent
    a flash of the wrong theme on load. This tiny inline script
    runs synchronously in <head>, before any paint.
  -->
  <script>
    (function() {
      // Dark is the product default — light is an opt-in variant.
      var saved = localStorage.getItem('mb-theme');
      var theme = saved || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>

  <!-- CSS loaded dynamically with auto cache-bust version -->
  <script>
    (function() {
      var v = Date.now().toString(36);
      var sheets = ['/assets/css/style.css', '/assets/css/maplegamma.css', '/assets/css/screener.css', '/assets/css/charts.css', '/assets/css/animations.css'];
      sheets.forEach(function(href) {
        var l = document.createElement('link');
        l.rel = 'stylesheet';
        l.href = href + '?v=' + v;
        document.head.appendChild(l);
      });
    })();
  </script>
</head>
<body>
  <nav class="nav-bar">
    <a href="#/" class="nav-brand">
      <img src="/assets/img/maplegamma-logo.svg" alt="MapleGamma" height="42" style="height:42px;vertical-align:middle;margin-top:-4px">
    </a>
    <div class="nav-links">
      <a href="#/"              class="nav-link">Briefing</a>
      <a href="#/markets"       class="nav-link">Markets</a>
      <a href="#/gex"           class="nav-link">GEX &amp; Flow</a>
      <a href="#/track-record"  class="nav-link">Track Record</a>
      <a href="#/research"      class="nav-link">Research</a>
    </div>
    <button
      id="theme-toggle"
      class="theme-toggle"
      aria-label="Toggle light/dark mode"
      type="button"
    >
      <span class="theme-toggle-icon" aria-hidden="true"></span>
      <span class="theme-toggle-label"></span>
    </button>
  </nav>

  <main id="app">
    <div class="loading">Loading...</div>
  </main>

  <!-- TradingView lightweight-charts -->
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

  <script>
    (function() {
      var v = Date.now().toString(36);
      var scripts = [
        '/assets/js/utils.js',
        '/assets/js/state.js',
        '/assets/js/dashboard.js',
        '/assets/js/ticker-detail.js',
        '/assets/js/research.js',
        '/assets/js/prediction-engine.js',
        '/assets/js/archive.js',
        '/assets/js/paper-trades.js',
        '/assets/js/chat.js',
        '/assets/js/maplegamma.js',
        '/assets/js/options-flow.js',
        '/assets/js/markets.js',
        '/assets/js/gexflow.js',
        '/assets/js/portfolio.js',
        '/assets/js/screener.js',
        '/assets/js/charts.js',
        '/assets/js/realtime.js',
        '/assets/js/router.js',
        '/assets/js/app.js'
      ];
      scripts.forEach(function(src) {
        var s = document.createElement('script');
        s.src = src + '?v=' + v;
        s.async = false;
        document.body.appendChild(s);
      });
    })();
  </script>
</body>
</html>

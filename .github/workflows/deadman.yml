name: deadman-monitor
# External dead-man's switch: if the Pi pipeline stops updating the site's
# public data files, this scheduled job FAILS and GitHub emails the owner.
# The Pi pushing data does not affect this — it runs on GitHub runners.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Check public data freshness
        env:
          PRIMARY_URL: https://maplegamma.com/data/maplegamma-data.json
          PRIMARY_MAX_AGE_HOURS: "26"
          SECONDARY_URL: https://maplegamma.com/data/crypto-cohorts.json
          SECONDARY_MAX_AGE_HOURS: "2"
        run: |
          python3 - <<'PY'
          import json, os, sys, urllib.request
          from datetime import datetime, timezone, timedelta

          def age_hours(url):
              req = urllib.request.Request(url, headers={"User-Agent": "mg-deadman/1.0"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  d = json.load(r)
              ts = None
              for k in ("generated_at", "_generated_at", "updated_at", "timestamp"):
                  if isinstance(d, dict) and k in d:
                      ts = d[k]; break
              if ts is None:
                  raise SystemExit(f"FAIL: no timestamp field in {url}")
              s = str(ts).replace("Z", "+00:00")
              try:
                  t = datetime.fromisoformat(s)
              except ValueError:
                  t = datetime.strptime(s[:16], "%Y-%m-%d %H:%M")
              if t.tzinfo is None:
                  t = t.replace(tzinfo=timezone(timedelta(hours=-4)))
              return (datetime.now(timezone.utc) - t).total_seconds() / 3600

          failures = []
          for name in ("PRIMARY", "SECONDARY"):
              url = os.environ[f"{name}_URL"]
              limit = float(os.environ[f"{name}_MAX_AGE_HOURS"])
              try:
                  a = age_hours(url)
                  print(f"{name}: {url} age={a:.1f}h (limit {limit}h)")
                  if a > limit:
                      failures.append(f"{name} data is {a:.1f}h old (limit {limit}h) — Pi pipeline may be DOWN")
              except SystemExit as e:
                  failures.append(str(e))
              except Exception as e:
                  failures.append(f"{name}: fetch failed: {e}")

          if failures:
              print("\n".join(failures))
              sys.exit(1)
          print("All fresh — pipeline alive.")
          PY

name = "morning-briefing-chat"
main = "src/index.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "maplegamma"
database_id = "6585930e-61a6-4679-a492-73b1ea643e88"

# Route auth/api on the canonical domain to this Worker (Pages serves everything
# else). chat/feedback still work via the workers.dev URL + CORS allow-list.
[[routes]]
pattern = "maplegamma.com/api/*"
zone_name = "maplegamma.com"

# Until the 301 redirects to maplegamma.com are set up in the CF dashboard, also
# route /api/* on the other live domains so email/password auth works there too
# (passkeys/OAuth remain .com-only via RP_ID/redirect).
[[routes]]
pattern = "maplegamma.ca/api/*"
zone_name = "maplegamma.ca"

[[routes]]
pattern = "briefing.arshadkazi.ca/api/*"
zone_name = "arshadkazi.ca"

[[routes]]
pattern = "maplegamma.arshadkazi.ca/api/*"
zone_name = "arshadkazi.ca"

# Passkey Related Origin Requests: the browser fetches this from the rpID host
# (maplegamma.com) during the ceremony to authorize passkeys on the other
# domains. Only needed on the canonical host.
[[routes]]
pattern = "maplegamma.com/.well-known/webauthn"
zone_name = "maplegamma.com"

[vars]
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
OPENROUTER_MODEL = "deepseek/deepseek-v4-pro"
RATE_LIMIT_PER_MIN = 10
APP_URL = "https://maplegamma.com"
MOCK_BILLING = "1"
TERMS_VERSION = "2026-07-08"
ACK_VERSION = "2026-07-08"
# Passkeys use ONE canonical rpID across all domains (Related Origin Requests).
WEBAUTHN_RP_ID = "maplegamma.com"
WEBAUTHN_RP_NAME = "MapleGamma"
WEBAUTHN_ORIGINS = "https://maplegamma.com,https://maplegamma.ca,https://maplegamma.arshadkazi.ca,https://briefing.arshadkazi.ca"
GOOGLE_CLIENT_ID = "PLACEHOLDER_WEB_CLIENT_ID"

name = "morning-briefing-chat"
main = "src/index.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "maplegamma"
database_id = "6585930e-61a6-4679-a492-73b1ea643e88"

# Premium data (screener/research/model JSON + charts) lives here, served ONLY
# via the entitlement-gated /api/data/* route. Never on Pages.
[[r2_buckets]]
binding = "PRIVATE"
bucket_name = "maplegamma-private"

# Route auth/api on the canonical domain to this Worker (Pages serves everything
# else). chat/feedback still work via the workers.dev URL + CORS allow-list.
[[routes]]
pattern = "maplegamma.com/api/*"
zone_name = "maplegamma.com"

# maplegamma.com is the canonical domain. The other hosts route their FULL
# traffic (/*) to this Worker, which 301-redirects everything to maplegamma.com
# (see REDIRECT_HOSTS in src/index.js) so shared links + SEO consolidate.
[[routes]]
pattern = "maplegamma.ca/*"
zone_name = "maplegamma.ca"

[[routes]]
pattern = "briefing.arshadkazi.ca/*"
zone_name = "arshadkazi.ca"

[[routes]]
pattern = "maplegamma.arshadkazi.ca/*"
zone_name = "arshadkazi.ca"

# Passkey Related Origin Requests: the browser fetches this from the rpID host
# (maplegamma.com) during the ceremony to authorize passkeys on the other
# domains. Canonical host only.
[[routes]]
pattern = "maplegamma.com/.well-known/webauthn"
zone_name = "maplegamma.com"

[vars]
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
OPENROUTER_MODEL = "deepseek/deepseek-v4-pro"
RATE_LIMIT_PER_MIN = 10
APP_URL = "https://maplegamma.com"
MOCK_BILLING = "0"
TERMS_VERSION = "2026-07-10"
ACK_VERSION = "2026-07-10"
# Passkeys use ONE canonical rpID across all domains (Related Origin Requests).
WEBAUTHN_RP_ID = "maplegamma.com"
WEBAUTHN_RP_NAME = "MapleGamma"
WEBAUTHN_ORIGINS = "https://maplegamma.com,https://maplegamma.ca,https://www.maplegamma.ca,https://briefing.arshadkazi.ca"
# ── Google OAuth setup ──
# 1. Create a Google Web OAuth client in Google Cloud Console:
#    https://console.cloud.google.com/apis/credentials
#    Redirect URI: https://maplegamma.com/api/auth/oauth/google/callback
# 2. Put the client ID here (replace PLACEHOLDER_WEB_CLIENT_ID).
# 3. Set the client secret via: wrangler secret put GOOGLE_CLIENT_SECRET
GOOGLE_CLIENT_ID = "64962355277-05lc5e8hh00bogo3f5llho4qtv66m95a.apps.googleusercontent.com"

# ── Helcim billing ──
# API token set via: wrangler secret put HELCIM_API_TOKEN
# Payment Plan IDs — set via wrangler secret after creating the plans in the
# Helcim dashboard. Four plans needed:
#   HELCIM_PLAN_BASIC_MONTHLY — $49/mo USD
#   HELCIM_PLAN_BASIC_ANNUAL  — $490/yr USD (10 months, 2 free)
#   HELCIM_PLAN_PRO_MONTHLY   — $99/mo USD
#   HELCIM_PLAN_PRO_ANNUAL    — $990/yr USD (10 months, 2 free)
# Create them at Helcim → Settings → Payment Plans, then:
#   printf '<id>' | npx wrangler secret put HELCIM_PLAN_BASIC_MONTHLY --name morning-briefing-chat
PRICE_BASIC = "49"
PRICE_PRO = "99"
CURRENCY = "CAD"
